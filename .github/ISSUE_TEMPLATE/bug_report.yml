name: 🐛 Bug Report
description: File a bug report to help us improve the scraper or dashboard.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below as accurately as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Open dashboard at '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? (Include error logs or terminal outputs if relevant).
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Details
      description: E.g., OS (Windows/macOS/Linux), Python version, Browser name (if dashboard bug).
      placeholder: Windows 11, Python 3.12.2, Chrome 124
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the problem here.
      placeholder: Any extra information...
    validations:
      required: false
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

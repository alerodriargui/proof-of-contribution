name: 🚀 Feature Request
description: Propose a new feature or enhancement to Proof of Contribution.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make this project better? Please fill out the form below.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is (e.g., I'm always frustrated when...).
      placeholder: Describe the problem or limitation...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the proposed solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the desired feature/behavior...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Describe alternatives...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Any extra information or design ideas...
    validations:
      required: false
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

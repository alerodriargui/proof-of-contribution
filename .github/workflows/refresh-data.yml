name: Refresh dashboard data

on:
  workflow_dispatch:
    inputs:
      full:
        type: boolean
        default: false
        description: "Skip incremental mode; perform a full historical scan"
      sleep:
        type: number
        default: 0.1
        description: "Seconds to pause between GitHub API requests"
      rate_limit_threshold:
        type: number
        default: 100
        description: "Minimum remaining API requests before pausing"
  schedule:
    # GitHub Actions schedules use UTC. Run away from the top of the hour.
    # Active ecosystems (ethereum, bitcoin, solana, etc.) get fresh data
    # every 12 hours. Low-activity ecosystems are only refreshed in the
    # same pass (no separate schedule needed). Cadence can be tuned per
    # ecosystem via the `config` dict in scripts/refresh_data.py.
    - cron: "17 */2 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-dashboard-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh CSV files incrementally
        env:
          GITHUB_TOKEN: ${{ secrets.DATA_GITHUB_TOKEN || github.token }}
        run: |
          python scripts/refresh_data.py \
            ${{ inputs.full && '--full' || '' }} \
            --sleep ${{ inputs.sleep || 0.1 }} \
            --rate-limit-threshold ${{ inputs.rate_limit_threshold || 100 }}

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Commit and publish changed data
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): automatic 12-hour refresh"
          git push
